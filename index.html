<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday MY JUJU ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
min-height:100vh;
overflow-x:hidden;
color:white;
}

#opening{
position:fixed;
inset:0;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
transition:1s;
}

#opening h1{
font-size:2.5rem;
margin-bottom:15px;
}

#opening p{
opacity:.8;
margin-bottom:30px;
}

.open-btn{
padding:15px 35px;
border:none;
border-radius:50px;
background:#ec4899;
color:white;
font-size:1rem;
cursor:pointer;
}

.hero{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
}

.card{
width:100%;
max-width:700px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.15);
border-radius:30px;
padding:35px;
box-shadow:0 20px 40px rgba(0,0,0,.3);
text-align:center;
}

.title{
font-size:3rem;
font-weight:700;
background:linear-gradient(90deg,#ff7eb3,#ffd6e7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:15px;
}

.subtitle{
opacity:.8;
margin-bottom:30px;
}

.message{
line-height:2;
font-size:1.05rem;
min-height:220px;
}

.photo-wrap{
margin-top:30px;
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.btn{
padding:12px 22px;
border:none;
border-radius:50px;
background:#ec4899;
color:white;
cursor:pointer;
font-size:.95rem;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.8);
justify-content:center;
align-items:center;
z-index:999;
}

.modal-content{
width:90%;
max-width:400px;
}

.modal img{
width:100%;
border-radius:20px;
}

.close{
margin-top:15px;
padding:10px 20px;
border:none;
background:white;
border-radius:50px;
cursor:pointer;
}

.heart{
position:fixed;
bottom:-20px;
color:#ff7eb3;
animation:float linear forwards;
pointer-events:none;
}

@keyframes float{
to{
transform:translateY(-110vh);
opacity:0;
}
}

@media(max-width:600px){

.title{
font-size:2.2rem;
}

.card{
padding:25px;
}

.message{
font-size:.98rem;
}
}
</style>
</head>
<body>

<audio id="bgMusic" loop>
<source src="https://www.image2url.com/r2/default/audio/1781181431167-3c050b96-43d5-405e-a42d-90dfd3c08b85.mp3" type="audio/mpeg">
</audio>

<div id="opening">
<h1>🎂 HAPPY BIRTH DAY  </h1>
<p>Sebuah pesan spesial untukmu</p>
<button class="open-btn" onclick="startExperience()">
Buka
</button>
</div>

<section class="hero">
<div class="card">

<h1 class="title">HAPPY BIRTH DAY</h1>

<p class="subtitle">
MY KISAH
</p>

<div class="message" id="typing"></div>

<div class="photo-wrap">


<button class="btn" onclick="showPhoto('https://i.ibb.co.com/fVXS7M2x/7485f9bd-5607-4b5b-8a8f-d8bb59bcd4f5.png')">
📸 (dibuka nanti setelah beres membaca yah)
</button>
</div>

</div>
</section>

<div class="modal" id="modal">
<div class="modal-content">
<img id="modalImg">
<center>
<button class="close" onclick="closePhoto()">
Tutup
</button>
</center>
</div>
</div>

<script>

const text = `

Selamat ulang tahun, Juju ❤️.

Hari ini aku tidak hanya merayakan bertambahnya usiamu,
tetapi juga merayakan semua hal baik yang ada dalam dirimu.

Terima kasih karena telah menjadi seseorang yang membuat
hari-hari terasa lebih hangat, dan lebih berarti.

Aku berharap tahun ini kamu lebih banyak mendapat, kebahagiaan,
lebih banyak mendapat kesempatan, dan lebih banyak alasan untuk tersenyum.

Tetaplah menjadi dirimu sendiri.
Karena versi dirimu yang sekarang sudah sangat berharga.

Dan jika suatu hari nanti kamu meragukan dirimu,
ingatlah bahwa ada seseorang yang selalu melihat begitu banyak hal baik dalam dirimu.

Happy Birthday, MY JUJU ❤️

`;

let i = 0;

function typeWriter(){
if(i < text.length){
document.getElementById("typing").innerHTML += text.charAt(i);
i++;
setTimeout(typeWriter,35);
}
}

function startExperience(){

document.getElementById("opening").style.opacity="0";

setTimeout(()=>{
document.getElementById("opening").style.display="none";
},1000);

const music = document.getElementById("bgMusic");
music.play().catch(()=>{});

typeWriter();
}

function showPhoto(src){
document.getElementById("modal").style.display="flex";
document.getElementById("modalImg").src=src;
}

function closePhoto(){
document.getElementById("modal").style.display="none";
}

setInterval(()=>{

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(12+Math.random()*25)+"px";
heart.style.animationDuration=(5+Math.random()*5)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},10000);

},300);

</script>

</body>
</html>
